name: "SMA Energy Meter emulator (per-phase)"
description: "Simulate SMA energy meters incl. per-phase values, multicast like a real EM. Fork of Roeland54/SMA-Energy-Meter-emulator."
version: "1.0.0-pp3"
slug: sma_perphase
url: "https://github.com/TallGuy74/SMA-Energy-Meter-emulator"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
host_network: true
services:
  - "mqtt:need"
options:
  enable_mqtt: true
  mqtt:
    broker: "auto_broker"
    port: "auto_port"
    username: "auto_user"
    password: "auto_password"
  enable_homewizard: false
  derive_missing: true
  sma_mqtt_topic: "sma/emeter2.0"
schema:
  enable_mqtt: bool?
  mqtt:
    broker: str
    port: str?
    username: str?
    password: str?
  enable_homewizard: bool
  derive_missing: bool?
  sma_mqtt_topic: str?
  homewizard_manual_addresses:
    - str?
  homewizard_destination_addresses:
    - match(^((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)\.?\b){4}$)?
  debug_logging: bool?
  disable_logging: bool?
